<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Slider Container -->
    <div class="slider">
        <h1>Image Slider</h1>

        <!-- Slides -->
        <div class="slides">
            <img class="slide active" src="https://images.unsplash.com/photo-1570481662006-a3a1374699e8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8ZG9scGhpbnxlbnwwfHwwfHx8MA%3D%3D" alt="">
            <img class="slide" src="https://images.unsplash.com/photo-1772090049995-6116febe0d60?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw0NXx8fGVufDB8fHx8fA%3D%3D" alt="">
            <img class="slide" src="https://images.unsplash.com/photo-1772795831981-4b66d1a3063e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2Nnx8fGVufDB8fHx8fA%3D%3D" alt="">
            <img class="slide" src="https://images.unsplash.com/photo-1770131091442-e672bd558370?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4MHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <img class="slide" src="https://images.unsplash.com/photo-1771613934266-0f474dc34245?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4N3x8fGVufDB8fHx8fA%3D%3D" alt="">
            <img class="slide" src="https://images.unsplash.com/photo-1770236597575-b27054ce4f4a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw4Mnx8fGVufDB8fHx8fA%3D%3D" alt="">
        </div>
        <!-- Buttons -->
        <button class="prev">&#10094</button>
        <button class="next">&#10095</button>

        <div class="dots"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
